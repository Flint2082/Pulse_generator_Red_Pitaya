<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Pitaya Pulse Generator GUI</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background: #e0e0e0;
        height: 100vh;
        overflow: hidden;
        padding: 16px;
    }

    h1 {
        margin-bottom: 12px;
        color: #333;
    }

    .app {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 60px);
        gap: 16px;
    }

    .top-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        min-height: 0;
    }

    .panel {
        background: #d4d4d4;
        border: 2px solid #7a7a7a;
        border-radius: 1px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .section {
        background: #ececec;
        border-radius: 1px;
        padding: 12px;
    }

    .section h2 {
        font-size: 1rem;
        margin-bottom: 10px;
        color: #222;
    }

    .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    button {
        padding: 10px 14px;
        border: none;
        border-radius: 1px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        font-weight: 600;
    }

    button:hover {
        background: #2563eb;
    }

    .input-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    input {
        padding: 8px;
        border: 1px solid #aaa;
        border-radius: 6px;
        width: 100px;
    }

    .output-card {
        background: white;
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #bbb;
    }

    .output-label {
        font-size: 0.85rem;
        color: #666;
        margin-bottom: 4px;
    }

    .output-value {
        font-size: 1rem;
        font-weight: bold;
        color: #111;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .plot-panel {
        flex: 1;
        background: #d4d4d4;
        border: 2px solid #7a7a7a;
        border-radius: 1px;
        padding: 12px;
        min-height: 0;
        display: flex;
        flex-direction: column;
    }

    #pulsePlot {
        flex: 1;
        width: 100%;
        min-height: 0;
    }
</style>
</head>

<body>

<h1>Pulse Generator GUI</h1>

<div class="app">

    <div class="top-row">




        <!-- OUTPUTS COLUMN -->
        <div class="panel">

            <div class="section">
                <h2>System Info</h2>
                <button onclick="getSystemInfo()">Refresh</button>
                <div class="output-card">
                    <div class="output-label">System</div>
                    <div class="output-value" id="systemInfo">--</div>
                </div>
            </div>

            <div class="section">
                <h2>Status</h2>
                <button onclick="getStatus()">Refresh</button>
                <div class="output-card">
                    <div class="output-label">Current Status</div>
                    <div class="output-value" id="statusInfo">--</div>
                </div>
            </div>

            <div class="section">
                <h2>Cycle Count</h2>
                <div class="output-card">
                    <div class="output-value" id="cycleCount">Loading...</div>
                </div>
            </div>

        </div>

                <!-- INPUTS COLUMN -->
        <div class="panel">

            <div class="section">
                <h2>Control</h2>
                <div class="button-row">
                    <button onclick="startPulser()">Start</button>
                    <button onclick="stopPulser()">Stop</button>
                    <button onclick="resetPulser()">Reset</button>
                    <button onclick="clearOutputs()">Clear Outputs</button>
                </div>
            </div>

            <div class="section">
                <h2>Set Period</h2>
                <div class="input-row">
                    <input type="number" id="periodTicks" placeholder="Ticks">
                    <button onclick="setPeriod()">Set Period</button>
                </div>
            </div>

            <div class="section">
                <h2>Set Pulse</h2>
                <div class="input-row">
                    <input type="number" id="outputIdx" placeholder="Output">
                    <input type="number" id="pulseIdx" placeholder="Pulse">
                    <input type="number" id="startTick" placeholder="Start">
                    <input type="number" id="stopTick" placeholder="Stop">
                    <button onclick="setPulse()">Set Pulse</button>
                </div>
            </div>

            <div class="section">
                <h2>Cycle Limit</h2>
                <div class="input-row">
                    <input type="number" id="maxCycleCount" placeholder="Cycles">
                    <button onclick="setMaxCycles()">Set Max</button>
                </div>
            </div>

        </div>

    </div>


    <!-- BOTTOM PLOT -->
    <div class="plot-panel">
        <button onclick="refreshPlot()" style="margin-bottom:10px; width:160px;">Refresh Plot</button>
        <div id="pulsePlot"></div>
    </div>

</div>
<script>
// Automatically support both local Live Server and Red Pitaya hosting.
// If running on localhost/127.0.0.1, target RP manually.
const API_BASE = (
    window.location.hostname === 'localhost' ||
    window.location.hostname === '127.0.0.1'
)
    ? 'http://rp-f0f587.local:8000/api'
    : '/api';

async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, options);

    if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText || `HTTP ${res.status}`);
    }

    return res.json();
}

async function getSystemInfo() {
    const data = await apiFetch('/get_system_info');
    document.getElementById('systemInfo').textContent = JSON.stringify(data, null, 2);
    return data;
}

async function getStatus() {
    const data = await apiFetch('/get_status');
    document.getElementById('statusInfo').textContent = JSON.stringify(data, null, 2);
    return data;
}

async function getPulseData() {
    const data = await apiFetch('/get_pulse_config');
    return data.pulse_data;
}

async function getCycleCount() {
    const data = await apiFetch('/get_cycle_count');
    document.getElementById('cycleCount').textContent = `Cycle Count: ${data.cycle_count}`;
    return data.cycle_count;
}

async function setMaxCycles() {
    const maxCycles = parseInt(document.getElementById('maxCycleCount').value);
    if (isNaN(maxCycles)) return alert('Enter a valid number for max cycles');

    await apiFetch('/set_max_cycles', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ max_cycles: maxCycles })
    });
}

async function refreshPlot() {
    try {
        const systemInfo = await getSystemInfo();
        const pulseData = await getPulseData();
        const cycleCount = await getCycleCount();
        plotPulseTrain(pulseData, systemInfo.fpga_clock_freq);
    } catch (err) {
        console.error('Plot refresh failed:', err);
    }
}

function plotPulseTrain(pulseData, clockSpeedHz) {
    const traces = [];
       

    period_length_ticks = pulseData[0][0][1] || 1; // Get period length from pulse data

    for (const [outputIdx, pulses] of Object.entries(pulseData)) {
        if (outputIdx == 0) continue; // Skip period length entry
        const numericOutput = Number(outputIdx);
        const x = [];
        const y = [];

        pulses.forEach(([start, stop]) => {
            x.push(start / clockSpeedHz, stop / clockSpeedHz, null);
            y.push(numericOutput, numericOutput, null);
        });

        traces.push({
            x,
            y,
            mode: 'lines',
            line: { width: 100 },
            name: `Output ${outputIdx}`
        });
    }

    const layout = {
        autosize: true,
        paper_bgcolor: '#d4d4d4',
        plot_bgcolor: '#f0f0f0',
        xaxis: {
            title: 'Time (s)',
            range: [0, period_length_ticks / clockSpeedHz]
        },
        yaxis: {
            title: 'Output',
            fixedrange: true,
            range: [0.5, parseInt(systemInfo.num_outputs) + 0.5]
        },
        showlegend: false,
        height: 500
    };

    Plotly.react('pulsePlot', traces, layout);
}

async function startPulser() {
    await apiFetch('/start', { method: 'POST' });
}

async function stopPulser() {
    await apiFetch('/stop', { method: 'POST' });
}

async function resetPulser() {
    await apiFetch('/reset', { method: 'POST' });
}

async function clearOutputs() {
    await apiFetch('/clear_outputs', { method: 'POST' });
    await refreshPlot();
}

async function setPeriod() {
    const ticks = parseInt(document.getElementById('periodTicks').value);
    if (isNaN(ticks)) return alert('Enter a valid number for ticks');

    await apiFetch('/set_period', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ period_length_ticks: ticks })
    });
    await refreshPlot();
}

async function setPulse() {
    const output_idx = parseInt(document.getElementById('outputIdx').value);
    const pulse_idx = parseInt(document.getElementById('pulseIdx').value);
    const start = parseInt(document.getElementById('startTick').value);
    const stop = parseInt(document.getElementById('stopTick').value);

    if ([output_idx, pulse_idx, start, stop].some(isNaN)) {
        return alert('Fill all fields correctly');
    }

    await apiFetch('/set_pulse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ output_idx, pulse_idx, start, stop })
    });
    await refreshPlot();
}


setInterval(getCycleCount, 100); // Update cycle count more frequently for responsiveness


</script>

</body>
</html>
