<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Pitaya Pulse Generator GUI</title>

<!-- Link to external CSS for styling -->
<link rel="stylesheet" href="styles.css">

<!-- Load Plotly from CDN for plotting pulse trains -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<!-- Link to external JavaScript for functionality -->
<script src="script.js" defer></script>

</head>
<body>

<h1>Pulse Generator GUI</h1>

<div class="app">

    <div class="top-row">
        <!-- INPUTS COLUMN -->
        <div class="panel" >

            <div class="section">
                <h2>Control</h2>
                <div class="button-row">
                    <button onclick="startPulser()">Start</button>
                    <button onclick="stopPulser()">Stop</button>
                    <button onclick="resetPulser()">Reset</button>
                    <button onclick="loadBitstream()">Load Bitstream</button>
                </div>
            </div>

            <div class="section">
                <h2>Set Period</h2>
                <div class="input-row">
                    <input type="number" id="periodTicks" placeholder="Ticks">
                    <button onclick="setPeriod()">Set Period</button>
                </div>
            </div>

            <div class="section">
                <h2>Set Pulse</h2>
                <div class="input-row">
                    <input type="number" id="outputIdx" placeholder="Output">
                    <input type="number" id="pulseIdx" placeholder="Pulse">
                    <input type="number" id="startTick" placeholder="Start">
                    <input type="number" id="stopTick" placeholder="Stop">
                    <button onclick="setPulse()">Set Pulse</button>
                    <button onclick="clearOutputs()">Clear All Outputs</button>
                </div>
            </div>

            <div class="section">
                <h2>Cycle Limit</h2>
                <div class="input-row">
                    <input type="number" id="maxCycleCount" placeholder="Cycles">
                    <button onclick="setMaxCycles()">Set Max</button>
                    <input type="checkbox" id="cycleLimitEnabled" onchange="toggleCycleLimit(this.checked)">
                    <label for="cycleLimitEnabled">Enable Cycle Limit</label>
                </div>
            </div>

        </div>

        <div class="panel">
            <div class="section">
                <h2>Logs</h2>
                <div id="logPanel" class="log-panel"></div>
            </div>
        </div>

                <!-- OUTPUTS COLUMN -->
        <div class="panel">

            <div class="section">
                <h2>System Info</h2>
                <div class="output-card" id="systemInfo">
                    <div class="output-row">
                        <span class="label">FPGA File</span>
                        <span class="value" id="fpgaFile">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Clock</span>
                        <span class="value" id="clockFreq">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Outputs</span>
                        <span class="value" id="numOutputs">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Max Pulses</span>
                        <span class="value" id="maxPulses">--</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Status</h2>
                <div class="output-card">
                    <div class="status-indicator" id="statusIndicator">UNKNOWN</div>
                </div>
            </div>

            <div class="section">
                <h2>Cycle Count</h2>
                <div class="output-card">
                    <div class="big-number" id="cycleCount">--</div>
                </div>
            </div>

        </div>
    </div>


    <!-- BOTTOM PLOT -->
    <div class="plot-panel" style="margin-bottom:20px">
        <div id="pulsePlot"></div>
    </div>

</div>

</body>
</html>
