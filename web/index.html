<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Pitaya Pulse Generator GUI</title>

<!-- Link to external CSS for styling -->
<link rel="stylesheet" href="styles.css">

<!-- Load Plotly from CDN for plotting pulse trains -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<!-- Link to external JavaScript for functionality -->
<script src="script.js" defer></script>

</head>
<body>

<h1>Pulse Generator GUI</h1>

<div class="app">

    <div class="top-row">
        <!-- INPUTS COLUMN -->
        <div class="panel" >

            <div class="section">
                <h2>Control</h2>
                <div class="button-row">
                    <button onclick="startPulser()">Start</button>
                    <button onclick="stopPulser()">Stop</button>
                    <button onclick="resetPulser()">Reset</button>
                    <button onclick="loadBitstream()">Reload Bitstream</button>
                </div>
            </div>

            <div class="section">
                <h2>Set Period</h2>
                <div class="input-row">

                    <input
                        type="number"
                        id="periodValue"
                        placeholder="Period"
                        step="any"
                    >

                    <select id="periodUnit">
                        <option value="1">s</option>
                        <option value="1e-3">ms</option>
                        <option value="1e-6" selected>µs</option>
                        <option value="1e-9">ns</option>
                    </select>

                    <button onclick="setPeriod()">
                        Set Period
                    </button>
                </div>
                <div id="periodQuantizationInfo"></div>
            </div>

            <div class="section">
                <h2>Set Pulse</h2>
                <div class="input-row">
                    <input type="number" id="outputIdx" placeholder="Output" min="1" step="1">
                    <input type="number" id="pulseIdx" placeholder="Pulse" min="0" step="1">
                    
                    <div class="timing-input-group">
                        <input
                            type="number"
                            id="startTime"
                            placeholder="Start"
                            step="any"
                        >

                        <input
                            type="number"
                            id="stopTime"
                            placeholder="Stop"
                            step="any"
                        >

                        <select id="timeUnit">
                            <option value="1">s</option>
                            <option value="1e-3">ms</option>
                            <option value="1e-6" selected>µs</option>
                            <option value="1e-9">ns</option>
                        </select>

                    </div>

                    
                    <button onclick="setPulse()">Set Pulse</button>
                    <button onclick="clearOutputs()">Clear All Outputs</button>
                    <div id="pulseQuantizationInfo"></div>
                </div>
            </div>

            <div class="section">
                <h2>Cycle Limit</h2>

                <form id="cycleForm" onsubmit="handleCycleSubmit(event)">
                    <div class="input-row">
                        <input type="number" id="maxCycleCount" placeholder="Cycles" min="1" step="1"  >
                        <button onclick="updateCycleLimit()" id="cycleLimitEnabled">Enable Limit</button>
                    </div>
                </form>
            </div>
            <div class="section">
                <h2>Pulse Config (CSV)</h2>

                <input type="file" id="csvFile" accept=".csv" style="width: 50%"">
                <button onclick="uploadCSV()">Upload</button>

                <button onclick="downloadCSV()">Download Current</button>
            </div>

        </div>

                <!-- OUTPUTS COLUMN -->
        <div class="panel">

            <div class="section">
                <h2>System Info</h2>
                <div class="output-card" id="systemInfo">
                    <div class="output-row">
                        <span class="label">FPGA File</span>
                        <span class="value" id="fpgaFile">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Clock</span>
                        <span class="value" id="clockFreq">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Outputs</span>
                        <span class="value" id="numOutputs">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Max Pulses</span>
                        <span class="value" id="maxPulses">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Period</span>
                        <span class="value" id="period">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Cycle count</span>
                        <span class="value" id="cycleCount">--</span>
                    </div>
                    <div class="output-row">
                        <span class="label">Cycle limit</span>
                        <span class="value" id="cycleLimit">--</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Status</h2>
                <div class="output-card">
                    <div class="status-indicator" id="statusIndicator">UNKNOWN</div>
                </div>
            </div>

        </div>

        
        <!-- LOGS COLUMN -->

        <div class="panel">
            <div class="section">
                <h2>Logs</h2>
                <button onclick="toggleLogs()" id="logToggleBtn" style="margin-bottom: 10px">Pause</button>
                <div id="logPanel" class="log-panel"></div>
            </div>
        </div>

    </div>


    <!-- BOTTOM PLOT -->
    <div class="plot-panel" style="margin-bottom:20px">
        <div id="pulsePlot"></div>
    </div>

</div>

</body>
</html>
